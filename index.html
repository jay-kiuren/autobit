<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUTOBIT</title>
    <link rel="icon" type="image/png" href="/favicon.ico?v=2" />
    <meta name="description" content="Applied technology company — AI agents, workflow automation, web applications, business systems, robotics, mobile apps." />
    <meta name="author" content="AUTOBIT" />

    <!-- Open Graph -->
    <meta property="og:title" content="AUTOBIT" />
    <meta property="og:description" content="AI agents, automation, web applications, and intelligent robotics" />
    <meta property="og:image" content="/autobitfb.png" />
    <meta property="og:url" content="https://autobitofficial.netlify.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AUTOBIT" />
    <meta name="twitter:description" content="ROBOTICS AND INNOVATION" />
    <meta name="twitter:image" content="/autobitfb.png" />
  </head>

  <body>
    <div id="fb-root"></div>

    <div
      class="fb-customerchat"
      attribution="setup_tool"
      page_id="701374596384613"
      theme_color="#1877f2"
      logged_in_greeting="Hi! How can AUTOBIT help you today?"
      logged_out_greeting="Hi! How can AUTOBIT help you today?"
      minimized="true"
    ></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Facebook SDK -->
    <script>
      window.fbAsyncInit = function () {
        FB.init({
          xfbml  : true,
          version: 'v19.0'
        });

  
        window.__fbMessengerOpen = false;
        window.__toggleFBMessenger = function () {
          var iframe = document.querySelector('.fb_dialog iframe, iframe[title*="Messenger"]');
          if (window.__fbMessengerOpen) {
            FB.CustomerChat.hide();
            window.__fbMessengerOpen = false;
          } else {
            FB.CustomerChat.show(true); 
            window.__fbMessengerOpen = true;
          }
        };

        FB.Event.subscribe('customerchat.dialogClose', function () {
          window.__fbMessengerOpen = false;
          window.dispatchEvent(new CustomEvent('fb-messenger-closed'));
        });

        FB.Event.subscribe('customerchat.dialogOpen', function () {
          window.__fbMessengerOpen = true;
        });
      };

      (function (d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s);
        js.id = id;
        js.src = 'https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js';
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'facebook-jssdk'));
    </script>
  </body>
</html>
